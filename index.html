<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Exfiltration</title>
</head>
<body>
    <h1>Data Received</h1>
    <div id="log"></div>
 <script>
        // Parse URL parameters for exfiltrated data
        const urlParams = new URLSearchParams(window.location.search);
        const exfiltratedData = urlParams.get('data');

        // Log exfiltrated data
        if (exfiltratedData) {
            console.log("Exfiltrated Data: ", exfiltratedData);
            document.getElementById('log').innerText = "Exfiltrated Data: " + exfiltratedData;
        } else {
            document.getElementById('log').innerText = "No data received.";
        }
    </script>

</body>
</html>
